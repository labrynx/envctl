    type: string
    sensitive: true
    description: Secret key for signing tokens
  APP_ENV:
    type: string
    sensitive: false
    description: Runtime environment
  APP_NAME:
    type: string
    sensitive: false
    description: Application name
  APP_VERSION:
    type: string
    sensitive: false
