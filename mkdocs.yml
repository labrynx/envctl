  - Getting started:
      - Overview: getting-started/index.md
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
      - First project: getting-started/first-project.md
      - Mental model: getting-started/mental-model.md
  - Guides:
      - Overview: guides/index.md
      - Docker: guides/docker.md
      - CI: guides/ci.md
      - Profiles: guides/profiles.md
      - Debugging: guides/debugging.md
      - Team: guides/team.md
      - Daily workflow: workflows/daily.md
  - Reference:
      - Overview: reference/index.md
      - Commands:
          - Overview: reference/commands/index.md
          - init: reference/commands/init.md
          - add: reference/commands/add.md
          - set: reference/commands/set.md
          - unset: reference/commands/unset.md
          - remove: reference/commands/remove.md
          - fill: reference/commands/fill.md
          - check: reference/commands/check.md
          - inspect: reference/commands/inspect.md
          - run: reference/commands/run.md
          - sync: reference/commands/sync.md
          - export: reference/commands/export.md
          - status: reference/commands/status.md
          - config: reference/commands/config.md
          - profile: reference/commands/profile.md
          - vault: reference/commands/vault.md
          - project: reference/commands/project.md
          - guard: reference/commands/guard.md
      - Configuration: reference/configuration.md
      - Vault: reference/vault.md
      - Profiles: reference/profiles.md
      - Security: reference/security.md
      - Encryption: reference/encryption.md
      - Observability: reference/observability.md
      - Platforms: reference/platforms.md
      - Distribution: reference/distribution.md
      - Roadmap: reference/roadmap.md
  - Concepts:
      - Overview: concepts/index.md
      - Contract: concepts/contract.md
      - Vault: concepts/vault.md
      - Profiles: concepts/profiles.md
      - Resolution: concepts/resolution.md
      - Projection: concepts/projection.md
      - Binding: concepts/binding.md
      - Metadata and local state: concepts/metadata.md
  - Architecture:
      - Overview: architecture/index.md
      - Layers: architecture/layers.md
      - Boundaries: architecture/boundaries.md
      - Internals (advanced): internals/architecture.md
      - Compatibility (advanced): internals/compatibility.md
  - Troubleshooting:
