src = ["src"]
packages = ["envctl"]

[rules]
select = ["I", "B", "C", "S"]
ignore = []

[public_roots]
modules = [
  "envctl.cli.app",
  "envctl.cli.commands.check.command",
  "envctl.cli.commands.vault.app",
]

[thresholds]
max_transitive_internal_modules = 200
max_transitive_third_party_modules = 15
max_depth = 10

barrel_max_imports = 60
aggregator_max_imports = 60

cli_direct_imports_max = 40
cli_command_modules_max = 65

[dependencies]
heavy = ["cryptography"]

[forbidden]
transitive_prefixes = []
cli_eager_prefixes = []

[per_file_ignores]
