version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Madrid"

    open-pull-requests-limit: 5

    labels:
      - "dependencies"
      - "python"

    commit-message:
      prefix: "build(deps)"

    groups:
      python-minor-and-patch:
        patterns:
          - "*"
        exclude-patterns:
          - "cryptography"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "Europe/Madrid"

    open-pull-requests-limit: 3

    labels:
      - "dependencies"
      - "github-actions"

    commit-message:
      prefix: "ci(actions)"
