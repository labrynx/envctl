version: 2

updates:
  # -------------------------------------
  # Python dependencies (pip)
  # -------------------------------------
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Madrid"

    open-pull-requests-limit: 5

    labels:
      - "dependencies"
      - "python"

    commit-message:
      prefix: "build(deps)"

    # Minor and patch updates are merged automatically after CI passes,
    # except for cryptography which is a heavy dependency and must always
    # be reviewed manually regardless of update type.
    groups:
      python-minor-and-patch:
        patterns:
          - "*"
        exclude-patterns:
          - "cryptography"
        update-types:
          - "minor"
          - "patch"

    # cryptography updates always require a manual review.
    # This covers both security advisories and API surface changes.
    ignore: []

  # -------------------------------------
  # GitHub Actions
  # -------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "Europe/Madrid"

    open-pull-requests-limit: 3

    labels:
      - "dependencies"
      - "github-actions"

    commit-message:
      prefix: "ci(actions)"