name: Release

permissions:
  contents: read

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build package
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --dev --locked

      - name: Show derived package version
        run: uv run python -m setuptools_scm

      - name: Build package
        run: uv build

      - name: Verify distribution contents
        run: |
          ls -la dist
          test -n "$(find dist -maxdepth 1 -type f -name '*.whl')"
          test -n "$(find dist -maxdepth 1 -type f -name '*.tar.gz')"

      - name: Check package metadata
        run: uv run python -m twine check dist/*.whl dist/*.tar.gz

      - name: Resolve release artifact paths
        id: artifacts
        run: |
          wheel_path="$(find dist -maxdepth 1 -type f -name '*.whl' | head -n 1)"
          sdist_path="$(find dist -maxdepth 1 -type f -name '*.tar.gz' | head -n 1)"
          test -n "$wheel_path"
          test -n "$sdist_path"
          echo "wheel_path=$wheel_path" >> "$GITHUB_OUTPUT"
          echo "sdist_path=$sdist_path" >> "$GITHUB_OUTPUT"

      - name: Build release SBOM
        run: |
          python -m venv .sbom-venv
          ./.sbom-venv/bin/python -m pip install --upgrade pip
          ./.sbom-venv/bin/python -m pip install cyclonedx-bom==7.3.0 "${{ steps.artifacts.outputs.wheel_path }}"
          ./.sbom-venv/bin/python -m cyclonedx_py environment --of JSON --output-file dist/envctl-wheel.sbom.cdx.json

      - name: Generate release checksums
        run: |
          cd dist
          sha256sum *.whl *.tar.gz envctl-wheel.sbom.cdx.json > SHA256SUMS

      - name: Generate artifact attestation for wheel
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: ${{ steps.artifacts.outputs.wheel_path }}

      - name: Generate artifact attestation for sdist
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: ${{ steps.artifacts.outputs.sdist_path }}

      - name: Generate SBOM attestation for wheel
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: ${{ steps.artifacts.outputs.wheel_path }}
          sbom-path: dist/envctl-wheel.sbom.cdx.json

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: python-dist
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error

      - name: Upload release metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-metadata
          path: |
            dist/SHA256SUMS
            dist/envctl-wheel.sbom.cdx.json
          if-no-files-found: error

  smoke-test:
    name: Smoke test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    needs:
      - build

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: python-dist
          path: dist

      - name: Download release metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-metadata
          path: dist

      - name: Create virtual environment
        run: python -m venv .release-venv

      - name: Verify artifact checksums (Unix)
        if: runner.os != 'Windows'
        run: |
          cd dist
          sha256sum -c SHA256SUMS

      - name: Verify artifact checksums (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $lines = Get-Content dist/SHA256SUMS
          foreach ($line in $lines) {
            if ([string]::IsNullOrWhiteSpace($line)) {
              continue
            }

            $parts = $line -split '\s+', 2
            if ($parts.Count -lt 2) {
              throw "Invalid checksum line: $line"
            }

            $expected = $parts[0].ToLower()
            $fileName = $parts[1].Trim()
            $actual = (Get-FileHash -Path (Join-Path 'dist' $fileName) -Algorithm SHA256).Hash.ToLower()

            if ($actual -ne $expected) {
              throw "Checksum mismatch for $fileName"
            }
          }

      - name: Install wheel and verify CLI (Unix)
        if: runner.os != 'Windows'
        run: |
          ./.release-venv/bin/python -m pip install --upgrade pip
          ./.release-venv/bin/python -m pip install dist/*.whl
          ./.release-venv/bin/python -m pip check
          ./.release-venv/bin/python -c "import envctl; print(envctl.__name__)"
          ./.release-venv/bin/envctl --version
          ./.release-venv/bin/python -m envctl --version

      - name: Install wheel and verify CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\.release-venv\Scripts\python.exe -m pip install --upgrade pip

          $wheel = Get-ChildItem -Path dist\*.whl | Select-Object -First 1
          if (-not $wheel) {
            throw "No wheel found in dist/"
          }

          .\.release-venv\Scripts\python.exe -m pip install $wheel.FullName
          .\.release-venv\Scripts\python.exe -m pip check
          .\.release-venv\Scripts\python.exe -c "import envctl; print(envctl.__name__)"
          .\.release-venv\Scripts\envctl.exe --version
          .\.release-venv\Scripts\python.exe -m envctl --version

      - name: Install sdist and verify CLI (Unix)
        if: runner.os != 'Windows'
        run: |
          python -m venv .release-venv-sdist
          ./.release-venv-sdist/bin/python -m pip install --upgrade pip
          ./.release-venv-sdist/bin/python -m pip install dist/*.tar.gz
          ./.release-venv-sdist/bin/python -m pip check
          ./.release-venv-sdist/bin/python -c "import envctl; print(envctl.__name__)"
          ./.release-venv-sdist/bin/envctl --version
          ./.release-venv-sdist/bin/python -m envctl --version

      - name: Install sdist and verify CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m venv .release-venv-sdist
          .\.release-venv-sdist\Scripts\python.exe -m pip install --upgrade pip

          $sdist = Get-ChildItem -Path dist\*.tar.gz | Select-Object -First 1
          if (-not $sdist) {
            throw "No sdist found in dist/"
          }

          .\.release-venv-sdist\Scripts\python.exe -m pip install $sdist.FullName
          .\.release-venv-sdist\Scripts\python.exe -m pip check
          .\.release-venv-sdist\Scripts\python.exe -c "import envctl; print(envctl.__name__)"
          .\.release-venv-sdist\Scripts\envctl.exe --version
          .\.release-venv-sdist\Scripts\python.exe -m envctl --version

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - smoke-test

    permissions:
      id-token: write
      contents: read

    environment:
      name: pypi

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish

    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: python-dist
          path: dist

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-metadata
          path: dist

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Build release notes
        id: notes
        run: |
          set -e

          VERSION="${GITHUB_REF_NAME#v}"

          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" {f=1; print; next}
            f && /^## \[/ {exit}
            f {print}
          ' CHANGELOG.md > section.md

          awk '
            /^### Added/   {section="added"; subsection=0; next}
            /^### Changed/ {section="changed"; subsection=0; next}
            /^### Improved/ {section="improved"; subsection=0; next}
            /^### /        {section=""; subsection=0; next}

            (section == "added" || section == "changed") && /^#### / {
              subsection=1
              next
            }

            (section == "added" || section == "changed") && subsection && /^- / {
              print
              subsection=0
              count++
              if (count == 3) exit
            }
          ' section.md > highlights.md || true

          count=$(wc -l < highlights.md)

          if [ "$count" -lt 3 ]; then
            awk -v existing="$count" '
              /^### Improved/ {in_improved=1; next}
              /^### / && $0 !~ /^### Improved/ {in_improved=0; next}

              in_improved && /^- / {
                print
                count++
                if (count + existing == 3) exit
              }
            ' section.md >> highlights.md || true
          fi

          if [ ! -s highlights.md ]; then
            head -n 5 section.md > highlights.md
          fi

          {
            echo "## envctl $VERSION"
            echo ""
            echo "### Highlights"
            cat highlights.md
            echo ""
            echo "---"
            echo ""
            cat section.md
          } > notes.md

          echo "file=notes.md" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          body_path: ${{ steps.notes.outputs.file }}
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS
            dist/envctl-wheel.sbom.cdx.json