name: CI Clinter

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-clinter-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clinter:
    name: Advisory clinter check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true

    steps:
      - name: Checkout envctl
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Checkout clinter
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: alessbarb/clinter
          path: .clinter-src

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build clinter
        working-directory: .clinter-src
        run: cargo build --locked --release

      - name: Run clinter advisory check
        run: .clinter-src/target/release/clinter check --format json .
