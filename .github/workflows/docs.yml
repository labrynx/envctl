name: Docs
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@[SHA]
        with:
          fetch-depth: 0  # necesario para git-revision-date
      - uses: actions/setup-python@[SHA]
        with:
          python-version: "3.12"
      - run: pip install -e ".[docs]"
      - run: mkdocs build --strict
      - uses: actions/upload-pages-artifact@[SHA]
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@[SHA]