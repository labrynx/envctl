name: CI Quality

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ruff lint
            command: uv run ruff check .
          - name: Ruff format
            command: uv run ruff format --check .
          - name: Mypy
            command: uv run mypy .
          - name: Bandit
            command: uv run bandit -c pyproject.toml -r src
          - name: Import Linter
            command: uv run lint-imports
          - name: Docs
            command: uv run mkdocs build --strict

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --dev --extra docs --locked

      - name: Run ${{ matrix.name }}
        run: ${{ matrix.command }}
