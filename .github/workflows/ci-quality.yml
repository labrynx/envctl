name: CI Quality

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ruff lint
            command: python -m ruff check .
          - name: Ruff format
            command: python -m ruff format --check .
          - name: Mypy
            command: python -m mypy
          - name: Bandit
            command: python -m bandit -c pyproject.toml -r src
          - name: Import Linter
            command: lint-imports
          - name: Docs
            command: python -m mkdocs build --strict

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,docs]"

      - name: Run ${{ matrix.name }}
        run: ${{ matrix.command }}
